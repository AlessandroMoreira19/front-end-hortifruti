<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HortiFruti — Relatórios</title>
  <link rel="stylesheet" href="css\style.css" />
</head>
<body>

  <!-- ======= SIDEBAR ======= -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="leaf">🌿</span>
      <h1>HortiFruti</h1>
    </div>

    <a href="painel.html" class="nav-item">
      <span class="nav-icon">▦</span>
      Painel
    </a>
    <a href="fluxo-abrir.html" class="nav-item">
      <span class="nav-icon">💰</span>
      Fluxo de Caixa
    </a>
    <a href="relatorios.html" class="nav-item active">
      <span class="nav-icon">📋</span>
      Relatórios
    </a>
  </aside>

  <!-- ======= CONTEÚDO ======= -->
  <main class="page-layout">
    <h2 class="page-title">Relatórios</h2>

    <div class="relatorio-panel">
      <h3 class="relatorio-panel-title">Configurar Relatório</h3>

      <div class="relatorio-row">

        <!-- Tipo de Relatório -->
        <div class="relatorio-field">
          <label class="form-label" for="tipo-relatorio">Tipo de Relatório</label>
          <select class="select-input" id="tipo-relatorio">
            <option value="fluxo">Fluxo de caixa</option>
            <option value="receitas">Receitas</option>
            <option value="despesas">Despesas</option>
          </select>
        </div>

        <!-- Data de Início -->
        <div class="relatorio-field">
          <label class="form-label" for="data-inicio">Data de Início</label>
          <input class="date-input" id="data-inicio" type="date" />
        </div>

        <!-- Data de Término -->
        <div class="relatorio-field">
          <label class="form-label" for="data-fim">Data de Término</label>
          <input class="date-input" id="data-fim" type="date" />
        </div>

        <!-- Botão Gerar -->
        <div class="relatorio-field">
          <label class="form-label label-hidden" for="acao">Ação</label>
          <a href="impressao.html" class="btn btn-verde-claro btn-rounded-sm">
            📄 Gerar
          </a>
        </div>

      </div>
    </div>

  </main>
  
</body>
</html>
