<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HortiFruti — Novo Lançamento</title>
  <link rel="stylesheet" href="css\style.css" />
</head>
<body>

  <!-- ======= SIDEBAR ======= -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="leaf">🌿</span>
      <h1>HortiFruti</h1>
    </div>

    <a href="painel.html" class="nav-item">
      <span class="nav-icon">▦</span>
      Painel
    </a>
    <a href="fluxo-abrir.html" class="nav-item active">
      <span class="nav-icon">💰</span>
      Fluxo de Caixa
    </a>
    <a href="relatorios.html" class="nav-item">
      <span class="nav-icon">📋</span>
      Relatórios
    </a>
  </aside>

  <!-- ======= CONTEÚDO ======= -->
  <main class="page-layout">

    <div class="form-panel w-660">
      <h3 class="form-panel-title">Novo Lançamento</h3>

      <label class="form-label" for="valor">Novo valor (R$)</label>
      <input
        class="form-input"
        id="valor"
        type="number"
        min="0"
        step="0.01"
        placeholder="Digite o valor a ser lançado:"
      />

      <a href="fluxo-aberto.html" class="btn btn-verde btn-full">
        💵 Lançar
      </a>
    </div>

  </main>
  <script src="javascript\app.js"></script>
</body>
</html>
